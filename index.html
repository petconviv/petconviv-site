<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Petconviv - Foco & Calma</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <!-- Player de Vídeo com Playlist e Shuffle Ativado -->
        <div class="video-background">
            <iframe 
                id="video-player"
                src="https://www.youtube.com/embed?listType=playlist&list=PL9QDRZwlkSkCgkxDcG4MfqPMaHt6Uc3ds&autoplay=1&mute=1&loop=1&shuffle=1" 
                frameborder="0" 
                allow="autoplay; encrypted-media" 
                allowfullscreen>
            </iframe>
        </div>

        <!-- Interface do Pomodoro -->
        <div class="pomodoro-overlay">
            <h1>Petconviv Focus</h1>
            <div id="timer">25:00</div>
            <div class="controls">
                <button id="start">Iniciar</button>
                <button id="pause">Pausar</button>
                <button id="reset">Resetar</button>
            </div>
            <p class="status">Trabalhe em paz enquanto seu pet relaxa.</p>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
